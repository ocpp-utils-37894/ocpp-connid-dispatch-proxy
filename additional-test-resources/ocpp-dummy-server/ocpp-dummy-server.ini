[logging]
proxy = DEBUG
websockets.client = INFO
websockets.server = INFO

[host]
; Host to listen on (default: 0.0.0.0)
addr = 0.0.0.0
; Port to listen on (default: 8321)
port = 8321
; watchdog stale time for charger (and server if LC/proxy) connections in seconds.
watchdog_stale = 300
; watchdog run / check interval in seconds
watchdog_interval = 30
; ping timeout in seconds
ping_timeout = 60
; PEM certificate chain file (absolute or relative path)
cert_chain = server-cert.pem
; PEM private key file matching cert_chain (absolute or relative path)
cert_key = server-key.pem
; Optional password for encrypted private key file (PEM). Leave empty if key is unencrypted.
cert_key_password = secret


[responses]
; Fixed OCPP response sent for every incoming message.
; {message_id} is replaced with the incoming message's unique id when available.
fixed_response = [3, "{message_id}", {"status": "Accepted", "currentTime": "2026-01-01T00:00:00Z", "interval": 300}]