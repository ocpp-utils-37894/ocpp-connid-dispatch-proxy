[logging]
proxy = DEBUG
websockets.client = INFO
websockets.server = INFO

[host]
; Host to listen on (default: 0.0.0.0)
addr = 0.0.0.0
; Port to listen on (default: 8321)
port = 8322
; watchdog stale time for charger (and server if LC/proxy) connections in seconds.
watchdog_stale = 300
; watchdog run / check interval in seconds
watchdog_interval = 30
; ping timeout in seconds
ping_timeout = 60
; TLS certificate chain file (enables wss when used with cert_key)
cert_chain = server-cert.pem
; TLS private key file (can be encrypted; see cert_key_password)
cert_key = server-key.pem
; Optional password for encrypted TLS private key (`cert_key`)
cert_key_password = secret

[charge-point-mapping]
; Map incoming numeric connection point IDs to charge point names.
; Format: <numeric_id> = <charge_point_name>
0 = CHARGEPOINT0
1 = CHARGEPOINT1

[ocpp-server]
; OCPP backend
url = wss://localhost:8321
; Close idle backend websocket connections after N seconds (0 = disabled)
server_idle_timeout = 300
; Optional CA/trust certificate file for validating OCPP server TLS certificate
trusted_cert = ca-cert.pem